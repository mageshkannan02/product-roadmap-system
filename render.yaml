# Blueprint for Product Roadmap System
databases:
  - name: roadmap-db
    databaseName: roadmap
    user: roadmap_admin
    plan: free # Note: Render free tier PostgreSQL is limited to 90 days.

services:
  # --- Backend API Service ---
  - type: web
    name: roadmap-api
    env: node
    plan: free
    buildCommand: npm install && cd server && npm install
    startCommand: npx tsx server/server.ts
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: DB_DIALECT
        value: postgres # Render uses PostgreSQL. Sequelize will handle the translation.
      - key: DB_NAME
        fromDatabase:
          name: roadmap-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: roadmap-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: roadmap-db
          property: password
      - key: DB_HOST
        fromDatabase:
          name: roadmap-db
          property: host
      - key: GOOGLE_API_KEY
        sync: false # Set this in Render Dashboard (Secret)
      - key: OPENAI_API_KEY
        sync: false # Set this in Render Dashboard (Secret)
      - key: DB_ALTER
        value: "true"
      - key: APP_URL
        fromService:
          type: web
          name: roadmap-api
          property: host

  # --- Frontend Static Site ---
  - type: web
    name: roadmap-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://roadmap-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
